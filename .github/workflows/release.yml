name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Test
        run: pytest -q
      - name: Build exe
        run: |
          python packaging/make_icon.py
          pyinstaller --clean --noconfirm packaging/heic-convert.spec
      - name: Smoke test
        env:
          HEIC_CONVERT_NO_WINDOW: "1"
        run: |
          # Launch WITHOUT redirecting output, matching a real double-click of a windowed
          # (console=False) exe: sys.stdout is then None. A startup regression that touches
          # stdout — e.g. uvicorn's log formatter calling isatty() — crashes here instead of
          # serving, so this catches that class of bug. Redirecting output hands the exe a
          # real stream and masks it (which is exactly how a crash-on-launch shipped before).
          Start-Process -FilePath dist/heic-convert.exe | Out-Null
          $served = $false
          for ($i = 1; $i -le 60; $i++) {
            try {
              if ((Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8092/).StatusCode -eq 200) { $served = $true; break }
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          Stop-Process -Name heic-convert -Force -ErrorAction SilentlyContinue
          if (-not $served) {
            Write-Host "did not serve within 60s; relaunching with stderr captured:"
            Start-Process -FilePath dist/heic-convert.exe -RedirectStandardError smoke.err.log | Out-Null
            Start-Sleep -Seconds 5
            Stop-Process -Name heic-convert -Force -ErrorAction SilentlyContinue
            if (Test-Path smoke.err.log) { Get-Content smoke.err.log }
            throw "exe did not serve http://127.0.0.1:8092/ within 60 seconds"
          }
        shell: pwsh
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/heic-convert.exe
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: heic-convert-exe
          path: dist/heic-convert.exe
